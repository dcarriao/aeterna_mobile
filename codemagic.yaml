workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files br.com.aeternalegado.app --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/export_options.plist

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
