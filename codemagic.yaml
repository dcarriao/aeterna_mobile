workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        certificates:
          - apple_distribution
        provisioning_profiles:
          - appstore_profile
          - aeterna_share_extension_appstore
      groups:
        - aeterna

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Inject iOS Share Extension
        script: |
          gem install xcodeproj
          ruby ios/add_share_extension.rb

      - name: Validate Share Extension target in pbxproj
        script: |
          echo "Validating ShareExtension target in project.pbxproj..."
          grep -q 'ShareExtension' ios/Runner.xcodeproj/project.pbxproj || {
            echo "FATAL: ShareExtension target not found in project.pbxproj after injection!"
            exit 1
          }
          echo "OK: ShareExtension target is present in project.pbxproj"

      - name: Fix iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY
          xcode-project use-profiles --project ios/Runner.xcodeproj
          # V2.2.3 — garante CODE_SIGN_ENTITLEMENTS no target Runner
          # apos flutter build, que pode sobrescrever o pbxproj.
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
            project.targets.each do |t|
              next unless t.name == 'Runner'
              t.build_configurations.each do |c|
                c.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'Runner/Runner.entitlements'
                c.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
              end
            end
            project.save
            puts 'Runner target: CODE_SIGN_ENTITLEMENTS + SANDBOXING applied'
          "
          ARCHIVE_PATH="build/ios/xcarchive/Runner.xcarchive"
          mkdir -p "$(dirname "$ARCHIVE_PATH")" /tmp/xcodebuild_logs
          set -o pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=R2KU8Q68QG \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$HOME/export_options.plist"

      - name: Validate entitlements in IPA
        script: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "FATAL: No IPA found"
            exit 1
          fi
          TEMPDIR=$(mktemp -d)
          unzip -q "$IPA" -d "$TEMPDIR"
          APP=$(find "$TEMPDIR/Payload" -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: No .app in IPA"
            rm -rf "$TEMPDIR"
            exit 1
          fi
          echo "=== Entitlements efetivos do app ==="
          codesign -d --entitlements - "$APP" 2>/dev/null | grep -E 'aps-environment|application-groups' || echo "FATAL: entitlements NAO encontrados no binario!"
          echo "=== Provisioning profile embedded ==="
          ls -la "$APP/embedded.mobileprovision" 2>/dev/null || echo "ERRO: profile nao embedded"
          echo "=== Capabilities no profile ==="
          security cms -D -i "$APP/embedded.mobileprovision" 2>/dev/null | grep -A1 -E 'aps-environment|com.apple.security.application-groups' || echo "ERRO: capabilities nao encontradas no profile!"
          rm -rf "$TEMPDIR"
          echo "Entitlements validation complete."

      - name: Validate IPA contains Share Extension .appex
        script: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "FATAL: No IPA found in build/ios/ipa/"
            exit 1
          fi
          echo "Validating IPA: $IPA"
          # Extract and inspect
          unzip -l "$IPA" | grep -q '\.appex/' && {
            echo "OK: .appex found in IPA"
            echo "Extension bundles:"
            unzip -l "$IPA" | grep '\.appex/' | head -5
          } || {
            echo "FATAL: No .appex bundle found in IPA — Share Extension will not appear in share sheet!"
            exit 1
          }
          # Verify Info.plist in extension has NSExtension
          unzip -p "$IPA" 'Payload/*.app/PlugIns/*.appex/Info.plist' 2>/dev/null | \
            grep -q 'NSExtension' && {
            echo "OK: NSExtension entry found in extension Info.plist"
          } || {
            echo "FATAL: NSExtension key missing from extension Info.plist"
            exit 1
          }
          # Verify bundle identifier
          echo "Main app bundle IDs in IPA:"
          unzip -p "$IPA" 'Payload/*.app/Info.plist' 2>/dev/null | \
            grep -A1 'CFBundleIdentifier' | grep -o '<string>.*</string>' || true
          echo "Extension bundle IDs in IPA:"
          unzip -p "$IPA" 'Payload/*.app/PlugIns/*.appex/Info.plist' 2>/dev/null | \
            grep -A1 'CFBundleIdentifier' | grep -o '<string>.*</string>' || true
          echo "IPA validation complete."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/export_options.plist

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
