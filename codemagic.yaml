workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        certificates:
          - apple_distribution
        provisioning_profiles:
          - appstore_profile
          - aeterna_share_extension_appstore
      groups:
        - aeterna

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Inject iOS Share Extension
        script: |
          gem install xcodeproj
          ruby ios/add_share_extension.rb

      - name: Set up iOS signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Fix iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Debug - Build ShareExtension target
        script: |
          set -x
          xcodebuild -project ios/Runner.xcodeproj \
            -target ShareExtension \
            -configuration Release \
            -sdk iphoneos \
            build 2>&1
          echo "ShareExtension build exit code: $?"

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY
          xcode-project use-profiles --project ios/Runner.xcodeproj
          xcode-project build-ipa --workspace ios/Runner.xcworkspace --scheme Runner 2>&1
          echo "xcode-project build-ipa exit code: $?"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/export_options.plist

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
