workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        certificates:
          - apple_distribution
        provisioning_profiles:
          - appstore_profile
          - aeterna_share_extension_appstore
      groups:
        - aeterna

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Inject iOS Share Extension
        script: |
          gem install xcodeproj
          ruby ios/add_share_extension.rb

      - name: Validate Share Extension target in pbxproj
        script: |
          echo "Validating ShareExtension target in project.pbxproj..."
          grep -q 'ShareExtension' ios/Runner.xcodeproj/project.pbxproj || {
            echo "FATAL: ShareExtension target not found in project.pbxproj after injection!"
            exit 1
          }
          echo "OK: ShareExtension target is present in project.pbxproj"

      - name: Fix iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY
          xcode-project use-profiles --project ios/Runner.xcodeproj
          # Injeta CODE_SIGN_ENTITLEMENTS e SANDBOXING sem Xcodeproj gem
          # (a gem corrompe PROVISIONING_PROFILE_SPECIFIER setado pelo use-profiles)
          ruby -e "
            pbx = 'ios/Runner.xcodeproj/project.pbxproj'
            content = File.read(pbx)
            changed = false
            unless content.include?('CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements')
              content.gsub!(/INFOPLIST_FILE = Runner\\/Info.plist;/) { |m|
                \"CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;\n\t\t\t\t#{m}\"
              }
              changed = true
              puts 'OK: CODE_SIGN_ENTITLEMENTS injected'
            else
              puts 'OK: CODE_SIGN_ENTITLEMENTS ja presente'
            end
            unless content.include?('ENABLE_USER_SCRIPT_SANDBOXING = NO')
              content.gsub!(/INFOPLIST_FILE = Runner\\/Info.plist;/) { |m|
                \"ENABLE_USER_SCRIPT_SANDBOXING = NO;\n\t\t\t\t#{m}\"
              }
              changed = true
              puts 'OK: ENABLE_USER_SCRIPT_SANDBOXING injected'
            end
            File.write(pbx, content) if changed
          "
          grep -q 'CODE_SIGN_ENTITLEMENTS' ios/Runner.xcodeproj/project.pbxproj && echo "OK: confirmado" || { echo "FATAL"; exit 1; }
          ARCHIVE_PATH="build/ios/xcarchive/Runner.xcarchive"
          mkdir -p "$(dirname "$ARCHIVE_PATH")" /tmp/xcodebuild_logs
          set -o pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=R2KU8Q68QG \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$HOME/export_options.plist"

      - name: Validate IPA Share Extension + entitlements (Push + App Group)
        script: |
          set -euo pipefail
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "FATAL: No IPA found in build/ios/ipa/"
            exit 1
          fi
          echo "Validating IPA: $IPA"
          unzip -l "$IPA" | grep -q '\.appex/' && {
            echo "OK: .appex found in IPA"
            unzip -l "$IPA" | grep '\.appex/' | head -5
          } || {
            echo "FATAL: No .appex bundle found in IPA — Share Extension will not appear in share sheet!"
            exit 1
          }
          unzip -p "$IPA" 'Payload/*.app/PlugIns/*.appex/Info.plist' 2>/dev/null | \
            grep -q 'NSExtension' && {
            echo "OK: NSExtension entry found in extension Info.plist"
          } || {
            echo "FATAL: NSExtension key missing from extension Info.plist"
            exit 1
          }

          # --- Extrai IPA e audita entitlements / profile (roda no Mac do CI) ---
          # Sem Mac local: o Darlan lê estes dumps nos artifacts/logs do Codemagic.
          WORK=/tmp/ipa_entitlements_check
          rm -rf "$WORK"
          mkdir -p "$WORK" /tmp/xcodebuild_logs
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 1 -name '*.app' | head -1)
          APEX=$(find "$APP/PlugIns" -maxdepth 1 -name '*.appex' 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: Runner .app nao encontrado no Payload"
            exit 1
          fi
          echo "APP=$APP"
          echo "APEX=${APEX:-<none>}"

          # codesign escreve o plist direto em arquivo (mais confiavel que :- + redirect)
          codesign -d --entitlements=/tmp/xcodebuild_logs/runner_entitlements.plist "$APP" 2>/dev/null || true
          echo "=== Runner codesign entitlements ==="
          cat /tmp/xcodebuild_logs/runner_entitlements.plist 2>/dev/null || echo "(vazio)"

          if [ -n "${APEX:-}" ]; then
            codesign -d --entitlements=/tmp/xcodebuild_logs/share_ext_entitlements.plist "$APEX" 2>/dev/null || true
            echo "=== ShareExtension codesign entitlements ==="
            cat /tmp/xcodebuild_logs/share_ext_entitlements.plist 2>/dev/null || echo "(vazio)"
          fi

          PROF="$APP/embedded.mobileprovision"
          if [ ! -f "$PROF" ]; then
            echo "FATAL: embedded.mobileprovision ausente no Runner"
            exit 1
          fi
          security cms -D -i "$PROF" > /tmp/xcodebuild_logs/runner_mobileprovision.plist
          echo "=== Runner profile (Name / UUID / Entitlements) ==="
          /usr/libexec/PlistBuddy -c 'Print :Name' /tmp/xcodebuild_logs/runner_mobileprovision.plist || true
          /usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/xcodebuild_logs/runner_mobileprovision.plist || true
          /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/xcodebuild_logs/runner_mobileprovision.plist \
            > /tmp/xcodebuild_logs/runner_profile_entitlements.txt 2>/dev/null || true
          cat /tmp/xcodebuild_logs/runner_profile_entitlements.txt || echo "(Entitlements do profile vazios)"

          FAIL=0

          # 1) Binário Runner precisa ter aps-environment (Push)
          if grep -q 'aps-environment' /tmp/xcodebuild_logs/runner_entitlements.plist 2>/dev/null; then
            echo "OK: Runner codesign tem aps-environment"
            grep -A1 'aps-environment' /tmp/xcodebuild_logs/runner_entitlements.plist || true
          else
            echo "FATAL: Runner codesign SEM aps-environment — Push vai falhar com didFail APNs"
            FAIL=1
          fi

          # 2) Binário Runner precisa ter o App Group
          if grep -q 'group.com.aeterna.app' /tmp/xcodebuild_logs/runner_entitlements.plist 2>/dev/null; then
            echo "OK: Runner codesign tem group.com.aeterna.app"
          else
            echo "FATAL: Runner codesign SEM group.com.aeterna.app — share App Group NULO no device"
            FAIL=1
          fi

          # 3) Profile embutido precisa CONCEDER os mesmos entitlements
          if grep -q 'aps-environment' /tmp/xcodebuild_logs/runner_profile_entitlements.txt 2>/dev/null; then
            echo "OK: embedded.mobileprovision concede aps-environment"
          else
            echo "FATAL: embedded.mobileprovision NAO concede aps-environment — regenerar appstore_profile no Apple Developer/Codemagic"
            FAIL=1
          fi
          if grep -q 'group.com.aeterna.app' /tmp/xcodebuild_logs/runner_profile_entitlements.txt 2>/dev/null; then
            echo "OK: embedded.mobileprovision concede group.com.aeterna.app"
          else
            echo "FATAL: embedded.mobileprovision NAO concede group.com.aeterna.app — App Group nao marcado no App ID ou profile velho"
            FAIL=1
          fi

          # 4) Share Extension tambem precisa do App Group
          if [ -n "${APEX:-}" ]; then
            if grep -q 'group.com.aeterna.app' /tmp/xcodebuild_logs/share_ext_entitlements.plist 2>/dev/null; then
              echo "OK: ShareExtension codesign tem group.com.aeterna.app"
            else
              echo "FATAL: ShareExtension codesign SEM group.com.aeterna.app"
              FAIL=1
            fi
            APEX_PROF="$APEX/embedded.mobileprovision"
            if [ -f "$APEX_PROF" ]; then
              security cms -D -i "$APEX_PROF" > /tmp/xcodebuild_logs/share_ext_mobileprovision.plist
              /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/xcodebuild_logs/share_ext_mobileprovision.plist \
                > /tmp/xcodebuild_logs/share_ext_profile_entitlements.txt 2>/dev/null || true
              if grep -q 'group.com.aeterna.app' /tmp/xcodebuild_logs/share_ext_profile_entitlements.txt 2>/dev/null; then
                echo "OK: profile da ShareExtension concede group.com.aeterna.app"
              else
                echo "FATAL: profile aeterna_share_extension_appstore NAO concede group.com.aeterna.app"
                FAIL=1
              fi
            else
              echo "FATAL: embedded.mobileprovision ausente na ShareExtension"
              FAIL=1
            fi
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "=== RESUMO: IPA INVALIDO para Push/Share — NAO publicar no TestFlight ==="
            echo "Corrigir: Apple Developer → Identifiers → br.com.aeternalegado.app"
            echo "  → Push Notifications ON + App Groups com check em group.com.aeterna.app"
            echo "  → Profiles → regenerar App Store profile → atualizar appstore_profile no Codemagic"
            echo "Mesmo para a extensao ShareExtension (bundle .ShareExtension)."
            exit 1
          fi
          echo "=== RESUMO: IPA OK — aps-environment + App Group presentes no binario E no profile ==="

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_logs/*.plist
      - /tmp/xcodebuild_logs/*.txt
      - $HOME/export_options.plist

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
